services:
  # ─── Backend Service ────────────────────────────────────
  - type: web
    name: 2cheries-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend startCommand: cd backend && npm startstartCommand: cd backend && npm start node config/seed.js && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: 2cheries-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin2cheries
      - key: ADMIN_PASSWORD
        value: 2cheries2026!
      - key: FRONTEND_URL
        fromService:
          type: web
          name: 2cheries-frontend
          envVarKey: RENDER_EXTERNAL_URL

  # ─── Frontend Service ───────────────────────────────────
  - type: web
    name: 2cheries-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: 2cheries-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: 2cheries-db
    plan: free
    databaseName: db_2cheries
    user: user_2cheries
