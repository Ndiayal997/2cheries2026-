services:
  # ─── Backend Service ────────────────────────────────────
  - type: web
    name: 2cheries-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: 2cheries-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: 2cheries-frontend
          property: url

  # ─── Frontend Service ───────────────────────────────────
  - type: web
    name: 2cheries-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: 2cheries-backend
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: 2cheries-db
    plan: free
    databaseName: 2cheries_db
    user: postgres
