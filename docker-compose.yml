version: '3.9'

services:

  # ─── PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: 2cheries_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       2cheries_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-motdepassefort}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # exposé uniquement pour debug local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 2cheries_net

  # ─── Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 2cheries_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:         production
      PORT:             5000
      DB_HOST:          postgres
      DB_PORT:          5432
      DB_NAME:          2cheries_db
      DB_USER:          postgres
      DB_PASSWORD:      ${DB_PASSWORD:-motdepassefort}
      JWT_SECRET:       ${JWT_SECRET:-changez_ce_secret}
      JWT_EXPIRES_IN:   7d
      ADMIN_USERNAME:   ${ADMIN_USERNAME:-admin_2026}
      ADMIN_PASSWORD:   ${ADMIN_PASSWORD:-Dk9$3vR!q7TmP2hZ}
      FRONTEND_URL:     ${FRONTEND_URL:-http://localhost}
    ports:
      - "5000:5000"
    networks:
      - 2cheries_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Migration (run once) ─────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 2cheries_migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     2cheries_db
      DB_USER:     postgres
      DB_PASSWORD: ${DB_PASSWORD:-motdepassefort}
    command: sh -c "node config/migrate.js && node config/seed.js"
    networks:
      - 2cheries_net
    restart: "no"

  # ─── Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    container_name: 2cheries_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - 2cheries_net

volumes:
  postgres_data:
    driver: local

networks:
  2cheries_net:
    driver: bridge
